on:
  workflow_dispatch:
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - run: tar -czvf linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Enable Git long paths
        run: git config --system core.longpaths true
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: windows-x64.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: subosito/flutter-action@v2
      - name: Setup Android Signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
      - run: flutter pub get
      - name: Build Android APK
        env:
          RELEASE_STORE_FILE: upload-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release --target-platform android-arm,android-arm64,android-x64
          flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi
      - uses: actions/upload-artifact@v7
        with:
          path: build/app/outputs/flutter-apk/*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build macos --release
      - run: tar -czvf macos.tar.gz -C build/macos/Build/Products/Release lnu_elytra.app
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: macos.tar.gz

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../ios.ipa Payload
      - uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: ios.ipa
